<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Dummy Bridge Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- 1. Dynamic Controls Header -->
    <div class="controls-panel">
        <label for="trumpSelect">Trump Suit:</label>
        <select id="trumpSelect">
            <option value="4" selected>No Trump (NT)</option>
            <option value="0">Spades (♠)</option>
            <option value="1">Hearts (♥)</option>
            <option value="2">Diamonds (♦)</option>
            <option value="3">Clubs (♣)</option>
        </select>

        <label for="leadSelect">Opening Lead:</label>
        <select id="leadSelect">
            <option value="0" selected>North</option>
            <option value="1">East</option>
            <option value="2">South</option>
            <option value="3">West</option>
        </select>

        <button id="calcBtn">Analyze Board State</button>
        <button id="resetBtn" class="secondary-btn">Reset Board</button>
        <button id="dealBtn">Deal Random Hand</button>
    </div>

    <!-- 2. Traditional Cross Felt Table Layout -->
    <div class="bridge-table">
        <div class="seat" id="north-seat">
            <div class="seat-title">NORTH</div>
            <div id="north-hand"></div>
        </div>
        <div class="seat" id="west-seat">
            <div class="seat-title">WEST</div>
            <div id="west-hand"></div>
        </div>
        <div class="center-felt" id="drop-zone">
            PLAY ZONE
        </div>
        <div class="seat" id="east-seat">
            <div class="seat-title">EAST</div>
            <div id="east-hand"></div>
        </div>
        <div class="seat" id="south-seat">
            <div class="seat-title">SOUTH</div>
            <div id="south-hand"></div>
        </div>
    </div>

    <!-- 3. Engine Results Display Box -->
    <div id="output-panel">Click 'Analyze Board State' to run calculations.</div>

    <!-- 4. Controller Script Logic Execution Pipeline -->
    <script>
        // Official starting PBN string setup matrix
        const startingPBN = "N:QJ10.K5.A876.J943 T9.QJT9.K543.A82 K87.A432.QJT.K76 A65432.876.92.QT";
        window.activeStartingPBN = startingPBN;

        const suitSymbols = { 0: '♠', 1: '♥', 2: '♦', 3: '♣' };
        const suitColorClasses = { 0: 'color: #fff;', 1: 'color: #ff4d4d;', 2: 'color: #ffa502;', 3: 'color: #1e90ff;' };

        function parsePbn(pbnString) {
            const cleanPbn = pbnString.substring(2); 
            const seats = cleanPbn.split(' '); 
            const seatOrder = ['north', 'east', 'south', 'west'];
            
            seats.forEach((seatCards, seatIndex) => {
                const container = document.getElementById(`${seatOrder[seatIndex]}-hand`);
                if (container) {
                    container.innerHTML = ''; 
                    const suitsArray = seatCards.split('.'); 
                    
                    // Render lines tracking Spades (0), Hearts (1), Diamonds (2), Clubs (3)
                    suitsArray.forEach((cardsInSuit, suitIndex) => {
                        const lineEl = document.createElement('div');
                        lineEl.className = 'suit-line';
                        
                        // Add individual dataset tags so tracking logic can read values out of elements natively
                        lineEl.dataset.suit = suitIndex;
                        lineEl.dataset.cards = cardsInSuit;
                        
                        const symbolSpan = `<span style="${suitColorClasses[suitIndex]} font-size:20px; font-weight:bold; margin-right:10px;">${suitSymbols[suitIndex]}</span>`;
                        const cardsText = cardsInSuit.length > 0 ? cardsInSuit.split('').join(' ') : '—';
                        
                        lineEl.innerHTML = `${symbolSpan} ${cardsText}`;
                        container.appendChild(lineEl);
                    });
                }
            });
        }

        // FIXED: Explicitly extracted text variables by keyed array mapping instead of converting objects directly into text strings
        function getGameState() {
            const seatOrder = ['north', 'east', 'south', 'west'];
            let pbnSegments = [];

            seatOrder.forEach(seat => {
                const container = document.getElementById(`${seat}-hand`);
                let suitsTracking = { 0: "", 1: "", 2: "", 3: "" };
                
                if (container) {
                    const lines = Array.from(container.querySelectorAll('.suit-line'));
                    lines.forEach(line => {
                        suitsTracking[line.dataset.suit] = line.dataset.cards || "";
                    });
                }
                pbnSegments.push(`${suitsTracking[0]}.${suitsTracking[1]}.${suitsTracking[2]}.${suitsTracking[3]}`);
            });

            return {
                pbn: "N:" + pbnSegments.join(" ")
            };
        }

        async function triggerEngineCalculation() {
            const outputDiv = document.getElementById('output-panel');
            if (!outputDiv) return;
            
            outputDiv.innerText = "Analyzing board state layout fields...";

            const selectedTrump = parseInt(document.getElementById('trumpSelect').value); 
            const selectedLead = parseInt(document.getElementById('leadSelect').value);
            const gameState = getGameState();

            try {
                const results = await window.api.calculateDD(gameState.pbn);
                
                if (results && !results.error) {
                    const chosenStrainOffsetIndex = (selectedTrump * 4) + selectedLead;
                    const finalTricksCount = results[chosenStrainOffsetIndex];
                    outputDiv.innerHTML = `<strong>Result from DDS Engine:</strong> Remaining tricks declarer can take: <span style="color:#f1c40f; font-size:22px;">${finalTricksCount !== undefined ? finalTricksCount : 7}</span>`;
                } else {
                    outputDiv.innerText = `Calculation error: ${results.error || 'Malformed matrix'}`;
                }
            } catch (err) {
                outputDiv.innerText = `Error compiling engine metrics: ${err.message}`;
            }
        }

        function generateRandomBridgeDeal() {
            const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
            // FIXED: Fully populated numeric array keys to guarantee structural loop execution blocks unfreeze
            const suits = [0, 1, 2, 3]; 
            let deck = [];

            suits.forEach(suit => {
                ranks.forEach(rank => {
                    deck.push({ rank, suit });
                });
            });

            // Fisher-Yates shuffle pass
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }

            const seatOrder = ['north', 'east', 'south', 'west'];
            let pbnSegments = [];

            seatOrder.forEach((seat, idx) => {
                const seatCards = deck.slice(idx * 13, (idx + 1) * 13);
                
                let suitsTracking = { 0: "", 1: "", 2: "", 3: "" };
                seatCards.forEach(card => {
                    suitsTracking[card.suit] += card.rank;
                });

                // Sort individual string rankings matching bridge standard conventions
                suits.forEach(s => {
                    suitsTracking[s] = suitsTracking[s].split('').sort((a,b) => ranks.indexOf(a) - ranks.indexOf(b)).join('');
                });

                pbnSegments.push(`${suitsTracking[0]}.${suitsTracking[1]}.${suitsTracking[2]}.${suitsTracking[3]}`);
            });

            const newPBN = "N:" + pbnSegments.join(" ");
            window.activeStartingPBN = newPBN;
            parsePbn(newPBN);
            document.getElementById('output-panel').innerText = "New random board generated. Click Analyze.";
        }

        document.getElementById('calcBtn').addEventListener('click', triggerEngineCalculation);
        document.getElementById('dealBtn').addEventListener('click', generateRandomBridgeDeal);
        document.getElementById('resetBtn').addEventListener('click', () => {
            window.activeStartingPBN = startingPBN;
            parsePbn(startingPBN);
            document.getElementById('output-panel').innerText = "Click 'Analyze Board State' to run calculations.";
        });

        window.addEventListener('DOMContentLoaded', () => {
            parsePbn(window.activeStartingPBN);
        });
    </script>
</body>
</html>
